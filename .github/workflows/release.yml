name: Release

on:
  push:
    tags:
      - "v*"
      - "Gear-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: "dmg,app"
            extra_args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            bundles: "appimage,deb,rpm"
            extra_args: ""
          - platform: windows-latest
            bundles: "msi,nsis"
            extra_args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libsoup-3.0-dev

      - name: Install Windows MSI tooling
        if: matrix.platform == 'windows-latest'
        run: choco install wixtoolset -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Gear ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }} ${{ matrix.extra_args }}

      # Strip outdated bundled libwayland-* from the AppImage so it loads the
      # host's libs. The build host's libwayland (1.20) shadows newer Mesa
      # (1.22+ symbols), breaking EGL with EGL_BAD_PARAMETER; host copies are
      # ABI-stable and on the AppImage excludelist for exactly this reason.
      - name: Fix AppImage wayland libs and re-sign
        if: matrix.platform == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          BASENAME=$(basename "$APPIMAGE")
          LATEST=src-tauri/target/release/bundle/latest.json
          echo "Patching: $APPIMAGE"
          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/"
          pushd "$WORK" >/dev/null
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-cursor.so.0
          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run squashfs-root "$BASENAME"
          popd >/dev/null
          cp "$WORK/$BASENAME" "$APPIMAGE"
          rm -f "$APPIMAGE.sig"
          pnpm tauri signer sign "$APPIMAGE"
          if [ -f "$LATEST" ]; then
            NEW_SIG=$(cat "$APPIMAGE.sig")
            jq --arg sig "$NEW_SIG" '.platforms["linux-x86_64"].signature = $sig' "$LATEST" > "$LATEST.tmp"
            mv "$LATEST.tmp" "$LATEST"
          fi
          gh release upload "${GITHUB_REF_NAME}" "$APPIMAGE" "$APPIMAGE.sig" \
            --clobber --repo "$GITHUB_REPOSITORY"
